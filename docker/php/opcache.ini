; ─────────────────────────────────────────────────────────────────────────────
; OPcache configuration — Production-optimised
; Placed at: /usr/local/etc/php/conf.d/opcache.ini
; ─────────────────────────────────────────────────────────────────────────────

opcache.enable=1
opcache.enable_cli=0

; Memory limit for precompiled scripts (MB). 128 MB is sufficient for a
; typical Laravel 12 app. Increase if you see opcache pressure warnings.
opcache.memory_consumption=128

; String intern table memory limit
opcache.interned_strings_buffer=16

; Maximum number of files in the opcache hash table.
; Run `php artisan opcache:status` to tune this to actual file count.
opcache.max_accelerated_files=20000

; Revalidation: 0 = never check timestamps (ideal for immutable Docker images)
opcache.validate_timestamps=0

; Save opcache across process restarts (PHP 8+)
opcache.file_cache=/tmp/opcache
opcache.file_cache_only=0

; Preloading (PHP 8+): disabled for now — can be enabled in Sprint 3+
; opcache.preload=/var/www/html/bootstrap/opcache.php
; opcache.preload_user=www-data

opcache.fast_shutdown=1
opcache.huge_code_pages=1
