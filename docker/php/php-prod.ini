; ─────────────────────────────────────────────────────────────────────────────
; PHP production settings
; Placed at: /usr/local/etc/php/conf.d/php-prod.ini
; ─────────────────────────────────────────────────────────────────────────────

; Security: never expose PHP version in headers
expose_php = Off

; Error handling: log to stderr (Cloud Run picks this up)
display_errors = Off
log_errors = On
error_log = /dev/stderr
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; Execution limits
max_execution_time = 120
max_input_time = 60
memory_limit = 256M

; Upload limits
upload_max_filesize = 10M
post_max_size = 12M

; Session — handled by Redis in production (configured via .env)
session.gc_maxlifetime = 7200

; Timezone (override at app level via APP_TIMEZONE in .env, but set a sane default)
date.timezone = Asia/Jakarta
