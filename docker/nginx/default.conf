# ─────────────────────────────────────────────────────────────────────────────
# /etc/nginx/http.d/default.conf — Laravel Virtual Host
#
# Cloud Run injects $PORT (default 8080). Nginx listens on that port.
# PHP-FPM listens on the Unix socket /run/php-fpm.sock (configured in
# docker/php/www.conf).
# ─────────────────────────────────────────────────────────────────────────────

server {
    # Cloud Run passes traffic to $PORT — default 8080
    listen 8080 default_server;
    listen [::]:8080 default_server;

    root /var/www/html/public;
    index index.php;

    server_name _;

    charset utf-8;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Content-Type-Options  nosniff;
    add_header X-Frame-Options         SAMEORIGIN;
    add_header X-XSS-Protection        "1; mode=block";
    add_header Referrer-Policy         strict-origin-when-cross-origin;

    # ── Health check endpoint (Cloud Run / load balancer probes) ─────────────
    location = /up {
        access_log off;
        try_files $uri /index.php?$query_string;
    }

    # ── Static assets — serve directly with long cache TTL ───────────────────
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ── Vite manifest & build artifacts ──────────────────────────────────────
    location ^~ /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ── Favicon & robots.txt — no 404 log spam ───────────────────────────────
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # ── Deny direct access to hidden files (.env, .git, etc.) ────────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    # ── Main Laravel entry point ──────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM proxy ────────────────────────────────────────────────────────
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        # Unix socket — faster than TCP for same-container communication
        fastcgi_pass unix:/run/php-fpm.sock;

        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;

        include fastcgi_params;

        # Increase timeouts for long-running Livewire requests
        fastcgi_read_timeout 120s;
        fastcgi_connect_timeout 10s;
        fastcgi_send_timeout 120s;

        # Buffer settings
        fastcgi_buffer_size         128k;
        fastcgi_buffers             4 256k;
        fastcgi_busy_buffers_size   256k;
    }
}
