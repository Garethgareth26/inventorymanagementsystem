# ─────────────────────────────────────────────────────────────────────────────
# /etc/nginx/nginx.conf — Main Nginx configuration
#
# Tuned for a PHP-FPM Laravel app in a single container on Cloud Run.
# This file sets global worker/event settings; virtual-host (server block)
# config lives in /etc/nginx/http.d/default.conf (Alpine's convention).
# ─────────────────────────────────────────────────────────────────────────────

user www-data;

# Let Nginx auto-detect the number of CPU cores available in the container.
worker_processes auto;

# Write the PID file where Supervisor can see it
pid /run/nginx.pid;

error_log /dev/stderr warn;

events {
    # Maximum simultaneous connections per worker
    worker_connections 1024;
    multi_accept on;
}

http {
    # ── MIME types ─────────────────────────────────────────────────────────
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ─────────────────────────────────────────────────────────────
    # Write to stdout/stderr so Cloud Run picks them up as structured logs
    access_log /dev/stdout combined;
    error_log  /dev/stderr warn;

    # ── Performance ──────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens      off;   # Don't reveal Nginx version in headers

    # ── Gzip compression ────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/javascript
        text/xml
        application/xml
        application/xml+rss
        image/svg+xml;

    # ── Client body / upload limits ─────────────────────────────────────────
    client_max_body_size 10M;

    # ── Include virtual-host configs ─────────────────────────────────────────
    include /etc/nginx/http.d/*.conf;
}
