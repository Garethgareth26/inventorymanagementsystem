name: CI — Lint · Static Analysis · Tests · Build · Deploy

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# Only one workflow runs at a time per branch (cancels in-progress on new push)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PHP_VERSION: "8.4"
  NODE_VERSION: "22"
  # Google Artifact Registry image path — update for your GCP project
  IMAGE: asia-southeast2-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/akuna-registry/akuna-inventory

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Job 1: Lint — Laravel Pint (code style)
  # ─────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (Pint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run Laravel Pint (check only — no auto-fix on CI)
        run: ./vendor/bin/pint --test

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2: Static Analysis — Larastan (PHPStan for Laravel)
  # ─────────────────────────────────────────────────────────────────────────
  static-analysis:
    name: Static Analysis (Larastan)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run Larastan
        run: ./vendor/bin/phpstan analyse --memory-limit=256M --no-progress

  # ─────────────────────────────────────────────────────────────────────────
  # Job 3: Tests — Pest (Feature + Unit, in-memory SQLite)
  # ─────────────────────────────────────────────────────────────────────────
  tests:
    name: Tests (Pest)
    runs-on: ubuntu-latest
    needs: [lint]  # Only run if lint passes (fail fast)
    services:
      # Redis is available as a real service for tests that need it
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      APP_ENV: testing
      DB_CONNECTION: sqlite
      DB_DATABASE: ":memory:"
      CACHE_STORE: array
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: array
      BCRYPT_ROUNDS: 4

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo_sqlite, sqlite3
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Build Vite assets
        run: npm run build
        
      - name: Copy .env for testing
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate --force

      - name: Run Pest tests
        run: php artisan test --parallel

  # ─────────────────────────────────────────────────────────────────────────
  # Job 4: Build & Push Docker image (only on push to main/master)
  # ─────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [lint, static-analysis, tests]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    permissions:
      contents: read
      id-token: write   # Needed for Workload Identity Federation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-southeast2-docker.pkg.dev --quiet

      - name: Set up Docker Buildx (multi-platform, build cache)
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          # Layer cache stored in GitHub Actions cache (speeds up subsequent builds)
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

  # ─────────────────────────────────────────────────────────────────────────
  # Job 5: Deploy to Cloud Run (only on push to main/master after successful build)
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    environment: production

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Update image tag in service.yaml
        run: |
          sed -i "s|:latest|:${{ github.sha }}|g" deploy/service.yaml

      - name: Deploy to Cloud Run
        run: |
          gcloud run services replace deploy/service.yaml \
            --region=asia-southeast2 \
            --project=${{ secrets.GCP_PROJECT_ID }}

      - name: Wait for rollout to complete
        run: |
          gcloud run services describe akuna-inventory \
            --region=asia-southeast2 \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --format="value(status.conditions[0].status)"

      - name: Output the deployed URL
        run: |
          gcloud run services describe akuna-inventory \
            --region=asia-southeast2 \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --format="value(status.url)"
