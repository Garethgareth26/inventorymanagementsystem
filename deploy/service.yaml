# ─────────────────────────────────────────────────────────────────────────────
# Cloud Run Service Definition — CV Akuna Inventory Management System
#
# Deployment:
#   gcloud run services replace deploy/service.yaml \
#     --region=asia-southeast2 \
#     --project=YOUR_GCP_PROJECT_ID
#
# Secrets are stored in Google Secret Manager and mounted as env vars.
# Never commit real values to this file — use placeholders documented below.
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: akuna-inventory
  annotations:
    # Cloud Run region — Jakarta (asia-southeast2) is closest to CV Akuna
    run.googleapis.com/launch-stage: GA
    run.googleapis.com/ingress: all         # All traffic allowed; restrict to
                                            # internal if VPC is added later.
spec:
  template:
    metadata:
      annotations:
        # ── Scaling ───────────────────────────────────────────────────────
        # min-instances: 0 = scale-to-zero (cost-efficient for MVP; SAD §7.7)
        # Raise to 1 if cold-start latency becomes unacceptable.
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "5"

        # ── Concurrency ───────────────────────────────────────────────────
        # PHP-FPM + Nginx can handle multiple concurrent requests per instance.
        # 80 is a safe starting value for a 2-CPU / 512MB instance.
        autoscaling.knative.dev/target: "80"

        # ── VPC (future) ──────────────────────────────────────────────────
        # run.googleapis.com/vpc-access-connector: projects/PROJECT/locations/REGION/connectors/CONNECTOR
        # run.googleapis.com/vpc-access-egress: all-traffic

    spec:
      # Cloud Run timeout — keep generous for PDF generation (SAD §8.5)
      timeoutSeconds: 300

      # Use the dedicated service account (least-privilege principle)
      serviceAccountName: akuna-inventory-sa@YOUR_GCP_PROJECT_ID.iam.gserviceaccount.com

      containers:
        - name: akuna-inventory
          # Image is updated by the GitHub Actions CI pipeline on every deploy.
          # Format: REGION-docker.pkg.dev/PROJECT/REPOSITORY/IMAGE:TAG
          image: asia-southeast2-docker.pkg.dev/YOUR_GCP_PROJECT_ID/akuna-registry/akuna-inventory:latest

          ports:
            - name: http1
              containerPort: 8080

          resources:
            limits:
              cpu: "2"
              memory: 512Mi
            requests:
              cpu: "0"          # Set to 0 to allow CPU bursting on Cold Run

          # ── Environment Variables ────────────────────────────────────────
          # Non-sensitive values are set directly; sensitive values are read
          # from Google Secret Manager via secretKeyRef.
          env:
            - name: APP_NAME
              value: "CV Akuna Inventory"
            - name: APP_ENV
              value: "production"
            - name: APP_DEBUG
              value: "true"
            - name: APP_URL
              value: "https://akuna-inventory-370596424020.asia-southeast2.run.app"

            # Laravel timezone (SAD §4.1 — timezone matches WIB)
            - name: APP_TIMEZONE
              value: "Asia/Jakarta"
            - name: APP_LOCALE
              value: "id"

            # Database — Supabase PostgreSQL (SAD §4)
            - name: DB_CONNECTION
              value: "pgsql"
            - name: DB_PORT
              value: "5432"

            # Injected from Secret Manager ↓
            - name: APP_KEY
              valueFrom:
                secretKeyRef:
                  name: akuna-app-key
                  key: latest
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: akuna-db-host
                  key: latest
            - name: DB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: akuna-db-database
                  key: latest
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: akuna-db-username
                  key: latest
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: akuna-db-password
                  key: latest

            # Session / Cache / Queue — PostgreSQL Database
            - name: SESSION_DRIVER
              value: "database"
            - name: CACHE_STORE
              value: "database"
            - name: QUEUE_CONNECTION
              value: "database"

            # Filesystem — Local (Supabase Storage planned for future)
            - name: FILESYSTEM_DISK
              value: "local"

            # Logging — structured JSON to Cloud Logging
            - name: LOG_CHANNEL
              value: "stderr"
            - name: LOG_LEVEL
              value: "warning"

          # ── Liveness / Startup Probe ───────────────────────────────────
          # Checks the Laravel health endpoint (added by the framework).
          livenessProbe:
            httpGet:
              path: /up
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3

  traffic:
    - percent: 100
      latestRevision: true
