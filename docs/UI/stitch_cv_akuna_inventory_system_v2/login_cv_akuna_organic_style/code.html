<body class="bg-page-bg min-h-screen w-full flex items-center justify-center p-lg font-body-md text-text-primary antialiased">
<!-- Login Container -->
<main class="w-full max-w-[420px] bg-card-surface rounded-xl p-xl shadow-[0_4px_24px_rgba(0,0,0,0.04)] relative z-10 flex flex-col">
<!-- Brand Header -->
<div class="flex flex-col items-center justify-center mb-xl text-center space-y-sm">
<div class="w-12 h-12 rounded-full bg-primary-fixed-dim flex items-center justify-center text-primary-container mb-xs">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1; font-size: 24px;">inventory_2</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-text-primary">CV Akuna</h1>
<p class="font-body-md text-body-md text-text-secondary">Inventory Management System</p>
</div>
<!-- Login Form -->
<form class="flex flex-col space-y-lg w-full">
<!-- Email Input -->
<div class="flex flex-col space-y-xs">
<label class="font-label-sm text-label-sm text-text-secondary pl-sm" for="email">Email Address</label>
<div class="relative w-full">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline-variant pointer-events-none" style="font-size: 20px;">mail</span>
<input class="w-full rounded-full border border-border-divider bg-transparent py-sm pl-[40px] pr-md font-body-md text-text-primary placeholder:text-outline-variant focus:outline-none focus:border-surface-tint focus:ring-1 focus:ring-surface-tint transition-shadow" id="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col space-y-xs">
<div class="flex justify-between items-center pl-sm pr-sm">
<label class="font-label-sm text-label-sm text-text-secondary" for="password">Password</label>
<a class="font-label-sm text-label-sm text-surface-tint hover:text-primary transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative w-full">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline-variant pointer-events-none" style="font-size: 20px;">lock</span>
<input class="w-full rounded-full border border-border-divider bg-transparent py-sm pl-[40px] pr-md font-body-md text-text-primary placeholder:text-outline-variant focus:outline-none focus:border-surface-tint focus:ring-1 focus:ring-surface-tint transition-shadow" id="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Actions -->
<div class="pt-sm">
<button class="w-full flex items-center justify-center rounded-full bg-primary-container text-on-primary font-label-sm text-label-sm py-md hover:bg-surface-tint transition-colors active:scale-[0.98] duration-150" type="submit">
                    Sign In
                </button>
</div>
</form>
</main>
<!-- Decorative background elements (optional, to enhance the "warm beige" feel slightly without cluttering) -->
<div class="absolute inset-0 z-0 pointer-events-none overflow-hidden">
<div class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] rounded-full bg-accent-tan-light opacity-30 blur-[100px]"></div>
<div class="absolute -bottom-[20%] -right-[10%] w-[60%] h-[60%] rounded-full bg-secondary-fixed-dim opacity-20 blur-[120px]"></div>
</div>
