<body class="bg-page-bg min-h-screen flex items-center justify-center p-md font-body-md text-text-primary antialiased">
<!-- Main Container -->
<div class="bg-card-surface rounded-xl p-xl shadow-sm w-full max-w-[480px] relative overflow-hidden">
<!-- Decorative Header Element -->
<div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-primary to-accent-tan-light opacity-50"></div>
<!-- Logo / Brand Anchor -->
<div class="flex justify-center mb-xl mt-sm">
<div class="w-12 h-12 rounded-full bg-accent-tan-light flex items-center justify-center text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1; font-size: 28px;">inventory_2</span>
</div>
</div>
<!-- Title & Subtitle -->
<div class="text-center mb-xl">
<h1 class="font-headline-lg text-headline-lg text-text-primary mb-sm">Forgot Password</h1>
<p class="font-body-md text-body-md text-text-secondary max-w-[320px] mx-auto">
                Enter the email address associated with your account and we'll send you a link to reset your password.
            </p>
</div>
<!-- Form -->
<form action="#" class="space-y-lg" method="POST">
<!-- Email Input -->
<div class="space-y-sm">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider block ml-sm" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none text-text-secondary">
<span class="material-symbols-outlined" style="font-size: 20px;">mail</span>
</div>
<input class="w-full bg-surface-bright border border-border-divider text-text-primary font-body-md text-body-md rounded-full py-md pl-[48px] pr-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-text-secondary/50" id="email" name="email" placeholder="e.g. user@example.com" required="" type="email"/>
</div>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary-container hover:bg-primary text-on-primary font-body-md text-body-md font-medium rounded-full py-md flex justify-center items-center gap-sm transition-all shadow-[0_4px_12px_rgba(0,0,0,0.08)] hover:shadow-[0_6px_16px_rgba(0,0,0,0.12)] mt-xl group" type="submit">
                Send Reset Link
                <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform" style="font-size: 20px;">arrow_forward</span>
</button>
</form>
<!-- Back to Login Link -->
<div class="mt-xl text-center">
<a class="inline-flex items-center gap-xs font-body-md text-body-md text-text-secondary hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined" style="font-size: 18px;">arrow_back</span>
                Back to Login
            </a>
</div>
</div>
